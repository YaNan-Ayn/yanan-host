<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>主持人亚楠 · 婚礼服务</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAF8F5; --surface: #FFFFFF; --gold: #C9A96E; --gold-light: #E8D5B0;
  --gold-subtle: #F7F2E8; --text: #3D3226; --text-secondary: #8B7E6E;
  --text-tertiary: #B8A99A; --border: #EBE4D8; --shadow-sm: 0 1px 3px rgba(61,50,38,0.06);
  --shadow-md: 0 4px 16px rgba(61,50,38,0.08); --radius-md: 16px;
  --ease-out: cubic-bezier(0.16,1,0.3,1);
}
html { font-size: 16px; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  max-width: 480px; margin: 0 auto; min-height: 100dvh; padding-bottom: 100px; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; max-width: 480px; margin: 0 auto;
  background: radial-gradient(ellipse at 50% 0%, rgba(201,169,110,0.04) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.hero { position: relative; z-index: 1; text-align: center; padding: 40px 24px 32px; }
.hero-ornament { display: inline-block; width: 48px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin-bottom: 20px; }
.hero-badge { display: inline-block; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; color: var(--gold); border: 1px solid var(--gold-light); padding: 4px 14px; border-radius: 20px; margin-bottom: 16px; }
.hero h1 { font-family: "Noto Serif SC", "STSong", serif; font-size: clamp(1.6rem, 5vw, 2rem); font-weight: 700; letter-spacing: 0.04em; margin-bottom: 6px; }
.hero .subtitle { font-size: 0.88rem; color: var(--text-secondary); }
.hero-divider { margin: 24px auto 0; width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-light), transparent); }
.main-content { position: relative; z-index: 1; padding: 0 20px; }
.section-title { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding: 0 4px; }
.section-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
.section-title span { font-size: 0.82rem; font-weight: 600; letter-spacing: 0.08em; color: var(--text-secondary); }
.category-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
.category-card { background: var(--surface); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; border: 1px solid var(--border); }
.category-card.active { box-shadow: var(--shadow-md); }
.category-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; cursor: pointer; min-height: 56px; }
.category-header:active { background: var(--gold-subtle); }
.category-header-left { display: flex; align-items: center; gap: 12px; }
.category-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
.category-icon.read { background: #F7F2E8; } .category-icon.flow { background: #F0EDE6; } .category-icon.about { background: #EDEBE4; }
.category-name { font-size: 0.95rem; font-weight: 600; }
.category-arrow { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; transition: transform 0.35s var(--ease-out); color: var(--text-tertiary); }
.category-card.active .category-arrow { transform: rotate(180deg); }
.category-arrow svg { width: 16px; height: 16px; }
.category-body { overflow: hidden; max-height: 0; transition: max-height 0.4s var(--ease-out); }
.category-body-inner { padding: 0 20px 18px; display: flex; flex-wrap: wrap; gap: 8px; }
.sub-tag { display: inline-flex; align-items: center; padding: 8px 14px; font-size: 0.8rem; color: var(--text); background: var(--gold-subtle); border-radius: 20px; font-weight: 500; letter-spacing: 0.03em; text-decoration: none; border: 1px solid transparent; cursor: pointer; }
.sub-tag:active { background: var(--gold-light); border-color: var(--gold); }
.article-card { display: flex; align-items: center; gap: 14px; background: var(--surface); border-radius: var(--radius-md); padding: 16px 18px; margin-bottom: 10px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); text-decoration: none; transition: all 0.25s var(--ease-out); }
.article-card:active { box-shadow: var(--shadow-md); transform: scale(0.985); }
.article-thumb { width: 52px; height: 52px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
.article-thumb.a1 { background: linear-gradient(135deg, #F7F2E8, #F0E8D8); } .article-thumb.a2 { background: linear-gradient(135deg, #F0EDE6, #E8E0D4); } .article-thumb.a3 { background: linear-gradient(135deg, #EDEBE4, #E0D8CC); }
.article-info { flex: 1; min-width: 0; }
.article-tag { font-size: 0.62rem; font-weight: 600; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 3px; }
.article-title { font-size: 0.88rem; font-weight: 600; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.article-arrow { color: var(--text-tertiary); flex-shrink: 0; }
.article-arrow svg { width: 18px; height: 18px; }
.footer-cta { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 16px 20px 28px; z-index: 10; display: flex; gap: 10px; background: linear-gradient(180deg, rgba(250,248,245,0) 0%, rgba(250,248,245,0.95) 30%, rgba(250,248,245,1) 50%); }
.btn-primary { flex: 2; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 14px 20px; background: linear-gradient(135deg, #C9A96E, #B8944E); color: #FFF; font-size: 0.9rem; font-weight: 600; letter-spacing: 0.04em; border-radius: 28px; text-decoration: none; border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(201,169,110,0.35); }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary { flex: 1; display: flex; align-items: center; justify-content: center; padding: 14px 16px; background: var(--surface); color: var(--text); font-size: 0.85rem; font-weight: 500; border-radius: 28px; border: 1px solid var(--border); text-decoration: none; }
.btn-secondary:active { background: var(--gold-subtle); }
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.9); background: rgba(61,50,38,0.88); color: #FFF; padding: 12px 24px; border-radius: 24px; font-size: 0.85rem; opacity: 0; pointer-events: none; z-index: 100; transition: all 0.3s var(--ease-out); }
.toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
@media (max-width: 360px) { .hero { padding: 32px 16px 24px; } .hero h1 { font-size: 1.4rem; } .main-content { padding: 0 14px; } }
</style>
</head>
<body>
<header class="hero">
  <div class="hero-ornament"></div>
  <div class="hero-badge">WEDDING HOST</div>
  <h1>主持人亚楠</h1>
  <p class="subtitle">管家式婚礼主持 · 让每一场婚礼都有温度</p>
  <div class="hero-divider"></div>
</header>
<main class="main-content">
  <div class="section-title"><span class="dot"></span><span>服务导航</span></div>
  <div class="category-list">
    <div class="category-card">
      <div class="category-header" onclick="toggleCategory(this)">
        <div class="category-header-left"><div class="category-icon read">📖</div><span class="category-name">新人必读</span></div>
        <div class="category-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
      </div>
      <div class="category-body"><div class="category-body-inner">
        <span class="sub-tag" onclick="showToast('即将上线')">婚前准备</span><span class="sub-tag" onclick="showToast('即将上线')">迎亲游戏</span><span class="sub-tag" onclick="showToast('即将上线')">新人问卷</span><span class="sub-tag" onclick="showToast('即将上线')">传统习俗</span>
      </div></div>
    </div>
    <div class="category-card">
      <div class="category-header" onclick="toggleCategory(this)">
        <div class="category-header-left"><div class="category-icon flow">💒</div><span class="category-name">婚礼流程</span></div>
        <div class="category-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
      </div>
      <div class="category-body"><div class="category-body-inner">
        <span class="sub-tag" onclick="showToast('即将上线')">中式婚礼</span><span class="sub-tag" onclick="showToast('即将上线')">西式婚礼</span>
      </div></div>
    </div>
    <div class="category-card">
      <div class="category-header" onclick="toggleCategory(this)">
        <div class="category-header-left"><div class="category-icon about">✨</div><span class="category-name">亚楠简介</span></div>
        <div class="category-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
      </div>
      <div class="category-body"><div class="category-body-inner">
        <span class="sub-tag" onclick="showToast('即将上线')">视频片段</span><span class="sub-tag" onclick="showToast('即将上线')">服务费用</span><span class="sub-tag" onclick="showToast('即将上线')">个人简介</span>
      </div></div>
    </div>
  </div>
  <div class="section-title"><span class="dot"></span><span>精选文章</span></div>
  <a class="article-card" href="https://mp.weixin.qq.com/s/ev48lbH5jGfuBfk4S6R8vA" target="_blank">
    <div class="article-thumb a1">📝</div><div class="article-info"><div class="article-tag">自我介绍</div><div class="article-title">一分钟带你了解主持人亚楠~</div></div>
    <div class="article-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
  </a>
  <a class="article-card" href="https://mp.weixin.qq.com/s/E4sx2ztmhe-QFP3qdG65lg" target="_blank">
    <div class="article-thumb a2">💰</div><div class="article-info"><div class="article-tag">服务报价</div><div class="article-title">主持人亚楠服务内容及费用</div></div>
    <div class="article-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
  </a>
  <a class="article-card" href="https://mp.weixin.qq.com/s/L5uRbjIik-fDnuqaNDiHlw" target="_blank">
    <div class="article-thumb a3">🎤</div><div class="article-info"><div class="article-tag">服务详情</div><div class="article-title">主持人服务详细内容（管家式主持人）</div></div>
    <div class="article-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
  </a>
</main>
<footer class="footer-cta">
  <a class="btn-primary" href="javascript:void(0)" onclick="openWechat()">添加微信 · 15639122828</a>
  <a class="btn-secondary" href="tel:15639122828">拨打电话</a>
</footer>
<div class="toast" id="toast"></div>
<script>
function toggleCategory(h){var c=h.parentElement,b=c.querySelector('.category-body');document.querySelectorAll('.category-card.active').forEach(function(e){if(e!==c){e.classList.remove('active');e.querySelector('.category-body').style.maxHeight='0px'}});if(c.classList.contains('active')){c.classList.remove('active');b.style.maxHeight='0px'}else{c.classList.add('active');b.style.maxHeight=b.scrollHeight+'px'}}
var tt;function showToast(m){var t=document.getElementById('toast');clearTimeout(tt);t.textContent=m;t.classList.add('show');tt=setTimeout(function(){t.classList.remove('show')},1800)}
function openWechat(){var w='15639122828';if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(w).then(function(){showToast('微信号已复制：'+w)}).catch(function(){fc(w)})}else{fc(w)}setTimeout(function(){window.location.href='weixin://'},600)}
function fc(t){var i=document.createElement('input');i.value=t;i.style.cssText='position:fixed;opacity:0';document.body.appendChild(i);i.select();try{document.execCommand('copy');showToast('微信号已复制：'+t)}catch(e){showToast('微信号：'+t)}document.body.removeChild(i)}
document.addEventListener('DOMContentLoaded',function(){var f=document.querySelector('.category-card');if(f){var b=f.querySelector('.category-body');f.classList.add('active');b.style.maxHeight=b.scrollHeight+'px'}});
</script>
</body>
</html>
