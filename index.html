<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>主持人亚楠 · 婚礼服务</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAF8F5;
  --surface: #FFFFFF;
  --gold: #C9A96E;
  --gold-light: #E8D5B0;
  --gold-subtle: #F7F2E8;
  --text: #3D3226;
  --text-secondary: #8B7E6E;
  --text-tertiary: #B8A99A;
  --border: #EBE4D8;
  --shadow-sm: 0 1px 3px rgba(61, 50, 38, 0.06);
  --shadow-md: 0 4px 16px rgba(61, 50, 38, 0.08);
  --shadow-lg: 0 8px 32px rgba(61, 50, 38, 0.10);
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 20px;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  padding-bottom: 100px;
  overflow-x: hidden;
}

/* ===== Decorative Background Texture ===== */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  max-width: 480px;
  margin: 0 auto;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(201, 169, 110, 0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 85% 20%, rgba(201, 169, 110, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ===== Hero Section ===== */
.hero {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px 24px 32px;
}

.hero-ornament {
  display: inline-block;
  width: 48px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin-bottom: 20px;
}

.hero-badge {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  color: var(--gold);
  text-transform: uppercase;
  border: 1px solid var(--gold-light);
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 16px;
}

.hero h1 {
  font-family: "Noto Serif SC", "STSong", "Songti SC", "SimSun", "KaiTi", serif;
  font-size: clamp(1.6rem, 5vw, 2rem);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}

.hero .subtitle {
  font-size: 0.88rem;
  color: var(--text-secondary);
  font-weight: 400;
  letter-spacing: 0.05em;
}

.hero-divider {
  margin: 24px auto 0;
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
}

/* ===== Main Content ===== */
.main-content {
  position: relative;
  z-index: 1;
  padding: 0 20px;
}

/* ===== Section Title ===== */
.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding: 0 4px;
}

.section-title .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
}

.section-title span {
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  text-transform: uppercase;
}

/* ===== Category Cards ===== */
.category-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 32px;
}

.category-card {
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: box-shadow 0.35s var(--ease-out);
  border: 1px solid var(--border);
}

.category-card.active {
  box-shadow: var(--shadow-md);
}

.category-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  min-height: 56px;
  transition: background 0.2s;
}

.category-header:active {
  background: var(--gold-subtle);
}

.category-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.category-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.category-icon.read { background: #F7F2E8; }
.category-icon.flow { background: #F0EDE6; }
.category-icon.about { background: #EDEBE4; }

.category-name {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.02em;
}

.category-arrow {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.35s var(--ease-out);
  color: var(--text-tertiary);
}

.category-card.active .category-arrow {
  transform: rotate(180deg);
}

.category-arrow svg {
  width: 16px;
  height: 16px;
}

.category-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.4s var(--ease-out);
}

.category-body-inner {
  padding: 0 20px 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.sub-tag {
  display: inline-flex;
  align-items: center;
  padding: 8px 14px;
  font-size: 0.8rem;
  color: var(--text);
  background: var(--gold-subtle);
  border-radius: 20px;
  font-weight: 500;
  letter-spacing: 0.03em;
  transition: all 0.2s;
  cursor: pointer;
  text-decoration: none;
  border: 1px solid transparent;
}

.sub-tag:active {
  background: var(--gold-light);
  border-color: var(--gold);
  color: #8B6914;
}

.sub-tag-count {
  font-size: 0.65rem;
  color: var(--text-tertiary);
  margin-left: 4px;
}

/* ===== Articles Section ===== */
.articles-section {
  margin-bottom: 16px;
}

.article-card {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--surface);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.25s var(--ease-out);
}

.article-card:active {
  box-shadow: var(--shadow-md);
  transform: scale(0.985);
}

.article-thumb {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
}

.article-thumb.a1 { background: linear-gradient(135deg, #F7F2E8, #F0E8D8); }
.article-thumb.a2 { background: linear-gradient(135deg, #F0EDE6, #E8E0D4); }
.article-thumb.a3 { background: linear-gradient(135deg, #EDEBE4, #E0D8CC); }

.article-info {
  flex: 1;
  min-width: 0;
}

.article-tag {
  font-size: 0.62rem;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 3px;
}

.article-title {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.02em;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.article-arrow {
  color: var(--text-tertiary);
  flex-shrink: 0;
}

.article-arrow svg {
  width: 18px;
  height: 18px;
}

/* ===== Footer CTA ===== */
.footer-cta {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: linear-gradient(180deg, rgba(250,248,245,0) 0%, rgba(250,248,245,0.95) 30%, rgba(250,248,245,1) 50%);
  padding: 16px 20px 28px;
  z-index: 10;
  display: flex;
  gap: 10px;
}

.btn-primary {
  flex: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 14px 20px;
  background: linear-gradient(135deg, #C9A96E, #B8944E);
  color: #FFF;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  border-radius: 28px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.25s var(--ease-out);
  box-shadow: 0 4px 16px rgba(201, 169, 110, 0.35);
}

.btn-primary:active {
  transform: scale(0.97);
  box-shadow: 0 2px 8px rgba(201, 169, 110, 0.4);
}

.btn-secondary {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 16px;
  background: var(--surface);
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.03em;
  border-radius: 28px;
  border: 1px solid var(--border);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}

.btn-secondary:active {
  background: var(--gold-subtle);
  border-color: var(--gold-light);
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: rgba(61, 50, 38, 0.88);
  color: #FFF;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 0.85rem;
  letter-spacing: 0.03em;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  transition: all 0.3s var(--ease-out);
}

.toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* ===== Motion: Reduced ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ===== Responsive Tweaks ===== */
@media (max-width: 360px) {
  .hero { padding: 32px 16px 24px; }
  .hero h1 { font-size: 1.4rem; }
  .main-content { padding: 0 14px; }
  .category-header { padding: 14px 16px; }
  .footer-cta { padding: 12px 14px 24px; }
}
</style>
</head>
<body>

<!-- Hero -->

<!-- Main Content -->
<main class="main-content">

  <!-- Categories -->
  <div class="section-title">

          <a class="sub-tag" href="javascript:void(0)" onclick="showToast('即将上线：迎亲游戏攻略')">迎亲游戏</a>

    </div>

    <!-- 婚礼流程 -->
    <div class="category-card">

          <div class="category-icon flow">💒</div>
          <span class="category-name">婚礼流程</span>
        </div>

        </div>
      </div>
      <div class="category-body">
        <div class="category-body-inner">
          <a class="sub-tag" href="javascript:void(0)" onclick="showToast('即将上线：中式婚礼流程')">中式婚礼</a>
          <a class="sub-tag" href="javascript:void(0)" onclick="showToast('即将上线：西式婚礼流程')">西式婚礼</a>

    </div>

    <!-- 亚楠简介 -->
    <div class="category-card">
      <div class="category-header" onclick="toggleCategory(this)">
        <div class="category-header-left">
          <div class="category-icon about">✨</div>
          <span class="category-name">亚楠简介</span>
        </div>
        <div class="category-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>

      </div>
      <div class="category-body">
        <div class="category-body-inner">
          <a class="sub-tag" href="javascript:void(0)" onclick="showToast('即将上线：主持视频片段')">视频片段</a>

          <a class="sub-tag" href="javascript:void(0)" onclick="showToast('即将上线：亚楠个人简介')">个人简介</a>

  </div>

  <!-- Articles -->
  <div class="section-title">
    <span class="dot"></span>

  </div>

  <div class="articles-section">
    <a class="article-card" href="https://mp.weixin.qq.com/s/ev48lbH5jGfuBfk4S6R8vA" target="_blank" rel="noopener">

<!-- Footer CTA -->
<footer class="footer-cta">
  <a class="btn-primary" href="javascript:void(0)" onclick="openWechat()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    添加微信 · 15639122828
  </a>
  <a class="btn-secondary" href="tel:15639122828">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    拨打电话
  </a>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
function toggleCategory(header) {
  const card = header.parentElement;
  const body = card.querySelector('.category-body');
  const isActive = card.classList.contains('active');

  // Close all
  document.querySelectorAll('.category-card.active').forEach(c => {
    if (c !== card) {
      c.classList.remove('active');
      c.querySelector('.category-body').style.maxHeight = '0px';
    }
  });

  if (isActive) {
    card.classList.remove('active');
    body.style.maxHeight = '0px';
  } else {
    card.classList.add('active');
    body.style.maxHeight = body.scrollHeight + 'px';
  }
}

let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 1800);
}

function openWechat() {
  const wxId = '15639122828';
  // Copy to clipboard
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(wxId).then(() => {
      showToast('微信号已复制：' + wxId + '，即将跳转微信');
    }).catch(() => {
      fallbackCopy(wxId);
    });
  } else {
    fallbackCopy(wxId);
  }
  // Try to open WeChat app
  setTimeout(() => {
    window.location.href = 'weixin://';
  }, 600);
  // Fallback: if WeChat doesn't open after 1.5s
  setTimeout(() => {
    if (document.visibilityState !== 'hidden') {
      showToast('微信号 ' + wxId + ' 已复制，请打开微信添加');
    }
  }, 1500);
}

function fallbackCopy(text) {
  const input = document.createElement('input');
  input.value = text;
  input.style.position = 'fixed';
  input.style.opacity = '0';
  document.body.appendChild(input);
  input.select();
  try {
    document.execCommand('copy');
    showToast('微信号已复制：' + text);
  } catch(e) {
    showToast('微信号：' + text + '，请手动添加');
  }
  document.body.removeChild(input);
}

// Initialize first category as open by default
document.addEventListener('DOMContentLoaded', () => {
  const firstCard = document.querySelector('.category-card');
  if (firstCard) {
    const body = firstCard.querySelector('.category-body');
    firstCard.classList.add('active');
    body.style.maxHeight = body.scrollHeight + 'px';
  }
});
</script>

</body>
